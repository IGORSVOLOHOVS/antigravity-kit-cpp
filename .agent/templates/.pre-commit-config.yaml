repos:
  # Python: Ruff (format + lint)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.1
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  # C++: Clang-Format
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.1
    hooks:
      - id: clang-format
        types: [c++, c, header]

  # General: File checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # Local: Commit message validation
  - repo: local
    hooks:
      - id: strict-commit-msg
        name: Check Commit Message Format
        language: python
        entry: python .agent/scripts/check_commit_msg.py
        stages: [commit-msg]

      - id: clang-tidy
        name: clang-tidy
        language: system
        entry: clang-tidy
        types: [c++]
        pass_filenames: true
        stages: [commit]
